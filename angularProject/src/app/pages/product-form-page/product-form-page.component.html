<main class="product-form-page">
  <a routerLink="/configuration/products" class="back-link">← Back to products</a>
  <h1>{{ isEditMode() ? 'Edit Product' : 'Add Product' }}</h1>

  @if (isLoading()) {
    <section class="state">Loading product data...</section>
  } @else {
    @if (submitError()) {
      <section class="state state-error">{{ submitError() }}</section>
    }

    @if (submitSuccess()) {
      <section class="state state-success">{{ submitSuccess() }}</section>
    }

    <form class="product-form" (ngSubmit)="submitForm()">
      <label>
        Name
        <input type="text" name="name" [(ngModel)]="formModel.name" required />
      </label>
      <label>
        Short Description
        <textarea name="shortDescription" [(ngModel)]="formModel.shortDescription" rows="3" required></textarea>
      </label>
      <label>
        Full Description
        <textarea name="fullDescription" [(ngModel)]="formModel.fullDescription" rows="5" required></textarea>
      </label>
      <label>
        Product Type Id
        <input type="number" name="productTypeId" [(ngModel)]="formModel.productTypeId" required />
      </label>
      <label>
        Price
        <input type="number" name="price" [(ngModel)]="formModel.price" min="0" step="0.01" required />
      </label>
      <label class="checkbox-field">
        <input type="checkbox" name="published" [(ngModel)]="formModel.published" />
        Published
      </label>
      <label class="checkbox-field">
        <input type="checkbox" name="deleted" [(ngModel)]="formModel.deleted" />
        Deleted
      </label>

      <div class="submit-row">
        <button type="submit" [disabled]="isSubmitting()">
          {{ isSubmitting() ? 'Saving...' : (isEditMode() ? 'Update Product' : 'Add Product') }}
        </button>
      </div>
    </form>
  }
</main>
