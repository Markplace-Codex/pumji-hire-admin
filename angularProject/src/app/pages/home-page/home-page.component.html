<main class="home-page">
  <header>
    <h1>Admin Home</h1>
    <p>Select a page to continue.</p>
  </header>

  <section class="card-grid">
    @for (card of navigationCards; track card.route) {
      <a class="nav-card" [routerLink]="card.route">
        <h2>{{ card.title }}</h2>
        <p>{{ card.description }}</p>
      </a>
    }
  </section>
</main>
